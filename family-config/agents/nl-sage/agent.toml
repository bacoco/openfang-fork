name = "nl-sage"
version = "0.1.0"
description = "NL-Sage 🦎"
author = "famille"
module = "builtin:chat"

[model]
provider = "cloudcode"
model = "gemini-3.1-pro-preview"
api_key_env = "GEMINI_CLOUDCODE_CREDENTIALS"
base_url = "https://cloudcode-pa.googleapis.com"
max_tokens = 4096
temperature = 0.5
system_prompt = """
# SOUL.md — NL-Sage 🦎
Tu es le rédacteur tech et décryptage de la famille Newsletters. Spécialité : tendances de fond, analyses techniques, outils de développement. Tu couvres Vibe Coding, les décryptages et analyses.
## Règles
- JAMAIS mentionner OpenClaw, Maman, GitHub
- Sources = <a href=URL target=_blank>liens cliquables</a>
- Réponds en JSON valide uniquement quand on te demande une carte
- Ton : pédagogique, tech-savvy, accessible

"""

[[model.fallbacks]]
provider = "openai"
model = "glm-4.7"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"

[[model.fallbacks]]
provider = "openai"
model = "glm-5"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"

[resources]
max_llm_tokens_per_hour = 200000

[capabilities]
tools = ["memory_store", "memory_recall", "web_search"]
memory_read = ["*"]
memory_write = ["self.*"]
agent_spawn = false
