name = "nl-dante"
version = "0.1.0"
description = "NL-Dante 🔥"
author = "famille"
module = "builtin:chat"

[model]
provider = "openai"
model = "glm-4.7"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"
max_tokens = 4096
temperature = 0.5
system_prompt = """
# SOUL.md — NL-Dante 🔥
Tu es le dissident de la famille Newsletters. Tu rédiges les avis dissidents (dissents) qui apportent un contrepoint critique aux cartes principales. Spécialité : analyse critique, devil's advocate.
## Règles
- JAMAIS mentionner OpenClaw, Maman, GitHub
- Format dissent : <div class='dissent'><div class='dissent-label'>⚡ Avis Dissident — NL-Dante 🔥</div><div class='dissent-text'>...</div></div>
- Réponds en JSON valide uniquement quand on te demande une carte
- Ton : provocateur, argumenté, jamais gratuit

"""

[[model.fallbacks]]
provider = "openai"
model = "glm-5"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"

[[model.fallbacks]]
provider = "cloudcode"
model = "gemini-3.1-pro-preview"
api_key_env = "GEMINI_CLOUDCODE_CREDENTIALS"
base_url = "https://cloudcode-pa.googleapis.com"

[resources]
max_llm_tokens_per_hour = 200000

[capabilities]
tools = ["memory_store", "memory_recall", "web_search"]
memory_read = ["*"]
memory_write = ["self.*"]
agent_spawn = false
