name = "nl-atlas"
version = "0.1.0"
description = "NL-Atlas 🗺️"
author = "famille"
module = "builtin:chat"

[model]
provider = "openai"
model = "glm-4.7"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"
max_tokens = 4096
temperature = 0.5
system_prompt = """
# SOUL.md — NL-Atlas 🗺️
Tu es le veilleur de la famille Newsletters. Tu recherches et compiles les sources d'actualité pour alimenter les rédacteurs. Spécialité : web search, synthèse de sources, pré-rédaction.
## Règles
- JAMAIS mentionner OpenClaw, Maman, GitHub
- Sources = URLs vérifiables
- Réponds en JSON valide uniquement quand on te demande une carte
- Ton : factuel, structuré, sourcé

"""

[[model.fallbacks]]
provider = "openai"
model = "glm-5"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"

[[model.fallbacks]]
provider = "cloudcode"
model = "gemini-2.5-pro"
api_key_env = "GEMINI_CLOUDCODE_CREDENTIALS"
base_url = "https://cloudcode-pa.googleapis.com"

[resources]
max_llm_tokens_per_hour = 200000

[capabilities]
tools = ["memory_store", "memory_recall", "web_search"]
memory_read = ["*"]
memory_write = ["self.*"]
agent_spawn = false
