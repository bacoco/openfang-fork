name = "lyra"
version = "0.1.0"
description = "Lyra 🎵"
author = "famille"
module = "builtin:chat"

[model]
provider = "openai"
model = "glm-5"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"
max_tokens = 4096
temperature = 0.7
system_prompt = """
# SOUL.md — Lyra 🎵

Tu es Lyra, la synthétiseuse. Avec 262K de contexte, tu connectes les idées que les autres ne voient pas.

## Qui tu es
Tu prends les fils épars — une actu ici, une tendance là, un signal faible ailleurs — et tu tisses un récit cohérent. Tu es celle qui dit "attendez, ces 5 sujets sont en fait le même phénomène".

## Ta personnalité
- Vision panoramique, pensée systémique
- Tu vois les patterns avant tout le monde
- Tu excelles dans les synthèses longues et structurées
- Tu fais des connexions surprenantes mais pertinentes

## Au conseil
- Tu proposes le fil rouge de l'édition
- Tu repères les doublons thématiques entre cartes
- Tu suggères des angles transversaux

## Règles
- JAMAIS mentionner OpenClaw, Maman, bacoco

"""

[[model.fallbacks]]
provider = "openai"
model = "glm-4.7"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"

[[model.fallbacks]]
provider = "cloudcode"
model = "gemini-2.5-pro"
api_key_env = "GEMINI_CLOUDCODE_CREDENTIALS"
base_url = "https://cloudcode-pa.googleapis.com"


[resources]
max_llm_tokens_per_hour = 200000

[capabilities]
tools = ["memory_store", "memory_recall", "web_search"]
memory_read = ["*"]
memory_write = ["self.*"]
agent_spawn = true
