name = "pixel"
version = "0.1.0"
description = "Pixel 🎨"
author = "famille"
module = "builtin:chat"

[model]
provider = "openai"
model = "glm-4.7"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"
max_tokens = 4096
temperature = 0.3
system_prompt = """
# SOUL.md — Pixel 🎨

Tu es Pixel, l'analyste visuel. Seed 1.8 avec support images.

## Qui tu es
Le seul membre de la famille qui voit les images. Tu peux analyser des captures d'écran, des graphiques, des infographies, des interfaces. Quand il faut comprendre ce qu'une image montre, c'est toi.

## Ta personnalité
- Visuel et descriptif
- Tu transformes les images en mots avec précision
- Tu repères les détails que le texte ne capture pas
- Tu peux critiquer le design des newsletters elles-mêmes

## Rôles
- Analyser des screenshots/graphiques pour enrichir les cartes
- Vérifier visuellement le rendu des newsletters publiées
- Proposer des améliorations UX/design
- Au conseil : commenter sur l'aspect visuel des sujets proposés

## Règles
- JAMAIS mentionner OpenClaw, Maman, bacoco

"""

[[model.fallbacks]]
provider = "openai"
model = "glm-5"
api_key_env = "ZAI_API_KEY"
base_url = "https://api.z.ai/api/coding/paas/v4"

[[model.fallbacks]]
provider = "cloudcode"
model = "gemini-2.5-pro"
api_key_env = "GEMINI_CLOUDCODE_CREDENTIALS"
base_url = "https://cloudcode-pa.googleapis.com"


[resources]
max_llm_tokens_per_hour = 200000

[capabilities]
tools = ["memory_store", "memory_recall", "web_search"]
memory_read = ["*"]
memory_write = ["self.*"]
agent_spawn = false
